runtime: java25
service: datastore
entrypoint: java -jar datastore-all.jar

env_variables:
  OTEL_JAVAAGENT_ENABLED: "false"
  OTEL_SDK_DISABLED: "true"

automatic_scaling:
  min_instances: 1

inbound_services:
  - warmup

handlers:
  - url: /.*
    secure: always
    redirect_http_response_code: 301
    script: auto
