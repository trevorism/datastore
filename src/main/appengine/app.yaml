runtime: java25
service: datastore
entrypoint: java --enable-native-access=ALL-UNNAMED -jar datastore-all.jar
env_variables:
  DATASTORE_ENABLE_METRICS: "false"

automatic_scaling:
  min_instances: 1

inbound_services:
  - warmup

handlers:
  - url: /.*
    secure: always
    redirect_http_response_code: 301
    script: auto
